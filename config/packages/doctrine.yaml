doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        types:
            qualification_id:   App\Qualification\Infrastructure\Persistence\Doctrine\Type\QualificationIdType
            supplier_id:        App\Qualification\Infrastructure\Persistence\Doctrine\Type\SupplierIdType
            auditor_id:         App\Qualification\Infrastructure\Persistence\Doctrine\Type\AuditorIdType
            qualification_score:  App\Qualification\Infrastructure\Persistence\Doctrine\Type\QualificationScoreType
            qualification_status: App\Qualification\Infrastructure\Persistence\Doctrine\Type\QualificationStatusType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            Qualification:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Qualification/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Qualification\Domain\Model'
                alias: Qualification

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
